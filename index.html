<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./fonts.css">
    <link rel="icon" type="image/x-icon" href="./assets/img/2_character_pepe/1_idle/idle/I-1.png" />
    <title>El Pollo Loco</title>

</head>

<body onload="init()">

    <div id="orientation-overlay" class="orientation-overlay d-none">
        <div class="orientation-content">
            <img src="./assets/img/rotate.svg" alt="Rotate device">
            <p>Bitte drehe dein Gerät ins Querformat, <br>um zu spielen</p>
        </div>
    </div>

    <h1>El Pollo Loco - Inmortal</h1>

    <div id="overlay-info" class="overlay-info d-none">
        <div id="overlay-info-content" class="overlay-info-content"></div>
    </div>

    <div id="game-container" class="game-container">

        <div class="sound-control" onclick="toggleSound()">
            <img id="sound-icon" src="./assets/img/volume_on.png" alt="Sound on">
        </div>

        <div id="start-screen" class="start-screen">
            <button id="start-button" class="game-button icon-button start-play" onclick="startGame()">
                <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path
                        d="M320 112C434.9 112 528 205.1 528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112zM320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM276.5 211.5C269.1 207 259.8 206.8 252.2 211C244.6 215.2 240 223.3 240 232L240 408C240 416.7 244.7 424.7 252.3 428.9C259.9 433.1 269.1 433 276.6 428.4L420.6 340.4C427.7 336 432.1 328.3 432.1 319.9C432.1 311.5 427.7 303.8 420.6 299.4L276.6 211.4zM362 320L288 365.2L288 274.8L362 320z" />
                </svg>
            </button>
            <div id="menu-buttons" class="menu-buttons">
                <!-- <button class="game-button restart-button">Restart</button> -->
                <button class="game-button icon-button" onclick="openInfoOverlay(getControlTemplate())">
                    <img src="./assets/img/settings.svg" alt="Controls" />
                </button>
                
            </div>
        </div>

        <div id="winning-screen" class="winning-screen d-none">
            <div class="end-screen-footer">
                <button class="game-button icon-button" onclick="restartGame()">
                    <img src="./assets/img/restart.svg" alt="Restart">
                </button>
                <button class="game-button icon-button" onclick="returnToStartMenu()">
                    <img src="./assets/img/home.svg" alt="Home">
                </button>
            </div>
        </div>

        <div id="gameover-screen" class="gameover-screen d-none">
            <div class="end-screen-footer">
                <button class="game-button icon-button" onclick="restartGame()">
                    <img src="./assets/img/restart.svg" alt="Restart">
                </button>
                <button class="game-button icon-button" onclick="returnToStartMenu()">
                    <img src="./assets/img/home.svg" alt="Home">
                </button>
            </div>
        </div>

        <canvas id="canvas" width="720" height="480"></canvas>


        <div class="control-mobile-panel">
            <div class="control-mobile-panel-left">
                <button id="btnLeft" class="button-left">left</button>
                <button id="btnRight" class="button-right">right</button>
            </div>
            <div class="control-mobile-panel-right">
                <button id="btnJump" class="button-jump">jump</button>
                <button id="btnThrow" class="button-throw">throw</button>
            </div>
        </div>
    </div>

    <button class="game-button impressum-button" onclick="openInfoOverlay(getImpressumTemplate())">Impressum</button>


    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/status-bar-health.class.js"></script>
    <script src="./models/status-bar-bottle.class.js"></script>
    <script src="./models/status-bar-coin.class.js"></script>
    <script src="./models/status-bar-endboss.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/chicken-small.class.js"></script>
    <script src="./models/cloud.class.js"></script>

    <script src="./models/world.class.js"></script>
    <script src="./models/background-object.class.js"></script>
    <script src="./models/keyboard-class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./models/bottle.class.js"></script>
    <script src="./models/coin.class.js"></script>

    <script src="./levels/level1.js"></script>
    <script src="./scripts/game.js"></script>
    <script src="./scripts/templates.js"></script>


</body>

</html>
